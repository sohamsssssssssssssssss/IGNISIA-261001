name: CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt
      - name: Run Alembic migration smoke test
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./data/ci-smoke.db
        run: |
          mkdir -p data
          alembic upgrade head
      - name: Run MSME scoring tests
        env:
          PYTHONPATH: backend
          DEMO_MODE: "true"
          REQUIRE_AUTH: "false"
        run: pytest tests/test_msme_scoring_api.py

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: frontend
        run: npm test
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:8000
          VITE_API_TOKEN: demo-analyst-token
        run: npm run build
