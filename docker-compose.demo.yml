version: "3.8"

# Lightweight demo compose — no Redis, no MinIO.
# Backend uses in-memory caching and local filesystem storage.
# Usage: docker-compose -f docker-compose.demo.yml up

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intellicredit-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=demo
      - DEMO_MODE=true
      - REQUIRE_AUTH=false
      - DATABASE_URL=sqlite:////app/data/intellicredit.db
      - DATABASE_PATH=/app/data/intellicredit.db
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    volumes:
      - ./backend/app:/app/app
      - backend_demo_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
        VITE_API_TOKEN: demo-analyst-token
    container_name: intellicredit-frontend
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  backend_demo_data:
